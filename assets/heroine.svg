<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 280" width="200" height="280">
  <!-- hair back -->
  <ellipse cx="100" cy="108" rx="62" ry="68" fill="#E8D5F0"/>
  <path d="M38,108 Q30,180 55,250 Q60,260 65,250 Q50,190 58,120Z" fill="#E8D5F0"/>
  <path d="M162,108 Q170,180 145,250 Q140,260 135,250 Q150,190 142,120Z" fill="#E8D5F0"/>
  <path d="M45,130 Q35,200 60,270 Q62,275 68,268 Q48,200 55,140Z" fill="#DCC4E8" opacity="0.6"/>
  <path d="M155,130 Q165,200 140,270 Q138,275 132,268 Q152,200 145,140Z" fill="#DCC4E8" opacity="0.6"/>

  <!-- body / dress -->
  <path d="M72,155 Q60,180 55,230 Q55,240 70,240 L130,240 Q145,240 145,230 Q140,180 128,155Z" fill="#C9A0DC"/>
  <path d="M72,155 Q68,170 65,185 L100,178 L135,185 Q132,170 128,155Z" fill="#F5E6F0"/>
  <!-- collar -->
  <path d="M82,155 L100,170 L118,155" fill="none" stroke="#B088C0" stroke-width="1.5"/>
  <!-- sash -->
  <path d="M90,185 Q100,190 110,185 Q108,195 112,210 Q100,215 88,210 Q92,195 90,185Z" fill="#F2B8D0" opacity="0.8"/>
  <path d="M100,210 Q98,230 95,250" fill="none" stroke="#F2B8D0" stroke-width="2" stroke-linecap="round"/>
  <path d="M100,210 Q102,230 108,248" fill="none" stroke="#F2B8D0" stroke-width="2" stroke-linecap="round"/>

  <!-- neck -->
  <rect x="93" y="145" width="14" height="14" rx="4" fill="#FDE8D8"/>

  <!-- face -->
  <ellipse cx="100" cy="110" rx="42" ry="44" fill="#FDE8D8"/>

  <!-- hair front -->
  <path d="M58,100 Q60,65 100,58 Q140,65 142,100 Q140,85 130,78 Q120,72 110,75 Q105,68 100,66 Q95,68 90,75 Q80,72 70,78 Q60,85 58,100Z" fill="#E8D5F0"/>
  <!-- bangs -->
  <path d="M65,95 Q70,80 82,78 Q78,90 72,100Z" fill="#DCC4E8" opacity="0.5"/>
  <path d="M135,95 Q130,80 118,78 Q122,90 128,100Z" fill="#DCC4E8" opacity="0.5"/>

  <!-- hair ribbon -->
  <circle cx="72" cy="82" r="5" fill="#F2B8D0"/>
  <path d="M67,82 Q60,75 55,80 Q58,85 67,82Z" fill="#F2B8D0"/>
  <path d="M67,82 Q62,90 58,88 Q60,82 67,82Z" fill="#F2B8D0"/>

  <!-- eyes -->
  <ellipse cx="82" cy="112" rx="7" ry="8" fill="#6B4C8A"/>
  <ellipse cx="118" cy="112" rx="7" ry="8" fill="#6B4C8A"/>
  <ellipse cx="83" cy="110" rx="3" ry="3.5" fill="white" opacity="0.8"/>
  <ellipse cx="119" cy="110" rx="3" ry="3.5" fill="white" opacity="0.8"/>
  <ellipse cx="80" cy="114" rx="1.5" ry="1.5" fill="white" opacity="0.5"/>
  <ellipse cx="116" cy="114" rx="1.5" ry="1.5" fill="white" opacity="0.5"/>

  <!-- eyelashes -->
  <path d="M74,106 Q78,104 82,105" fill="none" stroke="#6B4C8A" stroke-width="1"/>
  <path d="M118,105 Q122,104 126,106" fill="none" stroke="#6B4C8A" stroke-width="1"/>

  <!-- blush -->
  <ellipse cx="72" cy="122" rx="8" ry="4" fill="#F5C6D0" opacity="0.5"/>
  <ellipse cx="128" cy="122" rx="8" ry="4" fill="#F5C6D0" opacity="0.5"/>

  <!-- mouth -->
  <path d="M95,128 Q100,133 105,128" fill="none" stroke="#E8A0B0" stroke-width="1.5" stroke-linecap="round"/>

  <!-- fan in hand -->
  <g transform="translate(145,180) rotate(-20)">
    <rect x="0" y="0" width="3" height="35" rx="1.5" fill="#C9A0DC"/>
    <path d="M1.5,0 Q-15,-20 -25,-35 Q0,-30 1.5,-15 Q3,-30 28,-35 Q18,-20 1.5,0Z" fill="#F5E6F0" stroke="#DCC4E8" stroke-width="0.8"/>
    <circle cx="1.5" cy="35" r="3" fill="#F2B8D0"/>
    <path d="M1.5,38 Q0,45 -2,50" fill="none" stroke="#F2B8D0" stroke-width="1"/>
    <path d="M1.5,38 Q3,45 5,50" fill="none" stroke="#F2B8D0" stroke-width="1"/>
  </g>

  <!-- arm holding fan -->
  <path d="M128,170 Q138,175 145,180" fill="none" stroke="#FDE8D8" stroke-width="8" stroke-linecap="round"/>

  <!-- sparkles -->
  <text x="30" y="60" font-size="10" fill="#F2B8D0" opacity="0.7">&</text>
  <text x="160" y="55" font-size="8" fill="#DCC4E8" opacity="0.6">'</text>
  <text x="170" y="90" font-size="10" fill="#F2B8D0" opacity="0.5">&</text>
  <text x="25" y="140" font-size="8" fill="#DCC4E8" opacity="0.5">'</text>
</svg>
