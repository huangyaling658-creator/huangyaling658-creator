<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 50">
  <rect width="100%" height="100%" fill="#E8829A"/>
  <style>
    .line {
      fill: #FFE8F0;
      font-family: "PingFang SC", "Microsoft YaHei", "Hiragino Sans GB", "Noto Sans SC", sans-serif;
      font-size: 20px;
      text-anchor: middle;
      dominant-baseline: middle;
      opacity: 0;
      animation: show 12s linear infinite;
    }
    .line:nth-child(3) { animation-delay: 0s; }
    .line:nth-child(4) { animation-delay: 3s; }
    .line:nth-child(5) { animation-delay: 6s; }
    .line:nth-child(6) { animation-delay: 9s; }
    @keyframes show {
      0%, 4%   { opacity: 0; }
      8%, 21%  { opacity: 1; }
      25%, 100%{ opacity: 0; }
    }
  </style>
  <text class="line" x="400" y="28">恋爱与代码并存 · 甜而飒</text>
  <text class="line" x="400" y="28">OPC 实践者</text>
  <text class="line" x="400" y="28">代码界的新兵蛋子</text>
  <text class="line" x="400" y="28">甜美 × 活力 × 温柔 × 坚韧</text>
</svg>
