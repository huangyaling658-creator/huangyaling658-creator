<svg xmlns="http://www.w3.org/2000/svg" width="460" height="250" viewBox="0 0 460 250">
  <defs>
    <linearGradient id="bg_16" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E3A7BE;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D5879F;stop-opacity:1" />
    </linearGradient>
    <clipPath id="cardclip_16">
      <rect x="10" y="55" width="440" height="185" rx="22" ry="22"/>
    </clipPath>
  </defs>

  <!-- 卡片主体 -->
  <rect x="10" y="55" width="440" height="185" rx="22" ry="22" fill="url(#bg_16)"/>

  <!-- 白色实心圆骑在顶边 -->
  <circle cx="72" cy="55" r="36" fill="white"/>
  <text x="72" y="68" font-family="'Arial Rounded MT Bold', 'Hiragino Sans', Georgia, sans-serif" font-size="34" font-weight="bold" fill="#5B2A6E" text-anchor="middle">C</text>

  <!-- 标题：贴纸描边效果，骑跨顶边 -->
  <text x="125" y="68" font-family="'Arial Rounded MT Bold', 'Hiragino Sans', sans-serif" font-size="32" font-weight="900" fill="#6B5B6B" stroke="white" stroke-width="6" paint-order="stroke" stroke-linejoin="round">Codebase Course</text>

  <!-- 描述：小号，也带细描边 -->
  <text x="125" y="96" font-family="'Hiragino Sans', -apple-system, sans-serif" font-size="16" font-weight="600" fill="#6B5B6B" stroke="white" stroke-width="3" paint-order="stroke" stroke-linejoin="round">代码学习课程</text>

  <!-- 语言标签 -->
  <rect x="135" y="130" width="115" height="34" rx="17" fill="white"/>
  <circle cx="156" cy="147" r="7" fill="#083fa1"/>
  <text x="170" y="153" font-family="'Arial Rounded MT Bold', -apple-system, sans-serif" font-size="16" font-weight="bold" fill="#3D2B3A">Markdown</text>

  <!-- 底部白色半圆凸起 + 三点 -->
  <g clip-path="url(#cardclip_16)">
    <ellipse cx="75" cy="245" rx="55" ry="25" fill="white"/>
  </g>
  <circle cx="55" cy="232" r="5" fill="#D5879F"/>
  <circle cx="75" cy="232" r="5" fill="#D5879F"/>
  <circle cx="95" cy="232" r="5" fill="#D5879F"/>
</svg>