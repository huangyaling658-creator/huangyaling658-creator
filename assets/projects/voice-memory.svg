<svg xmlns="http://www.w3.org/2000/svg" width="460" height="250" viewBox="0 0 460 250">
  <defs>
    <linearGradient id="bg_13" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#C3D49A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A9BE7C;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- 卡片主体 -->
  <rect x="10" y="55" width="440" height="185" rx="22" ry="22" fill="url(#bg_13)"/>

  <!-- 白色实心圆骑在顶边 -->
  <circle cx="72" cy="55" r="36" fill="white"/>
  <text x="72" y="68" font-family="'Arial Rounded MT Bold', 'Hiragino Sans', Georgia, sans-serif" font-size="34" font-weight="bold" fill="#5B2A6E" text-anchor="middle">V</text>

  <!-- 标题：白字 + 深灰描边 -->
  <text x="125" y="70" font-family="'Arial Rounded MT Bold', 'Hiragino Sans', sans-serif" font-size="34" font-weight="900" fill="white" stroke="#3A3A3A" stroke-width="5" paint-order="stroke" stroke-linejoin="round">voice-memory</text>

  <!-- 描述：白字 + 深灰描边，放大 -->
  <text x="125" y="102" font-family="'Hiragino Sans', -apple-system, sans-serif" font-size="21" font-weight="700" fill="white" stroke="#3A3A3A" stroke-width="3.5" paint-order="stroke" stroke-linejoin="round">语音记录想法</text>

  <!-- 语言标签：纯白胶囊，无圆点 -->
  <rect x="125" y="135" width="120" height="36" rx="18" fill="white"/>
  <text x="185" y="160" font-family="'Arial Rounded MT Bold', -apple-system, sans-serif" font-size="17" font-weight="bold" fill="#3D2B3A" text-anchor="middle">Swift</text>

  <!-- 三个白点，无围边 -->
  <circle cx="50" cy="218" r="5.5" fill="white"/>
  <circle cx="70" cy="218" r="5.5" fill="white"/>
  <circle cx="90" cy="218" r="5.5" fill="white"/>
</svg>