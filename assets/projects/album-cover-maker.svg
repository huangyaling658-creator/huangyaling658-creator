<svg xmlns="http://www.w3.org/2000/svg" width="440" height="220" viewBox="0 0 440 220">
  <defs>
    <linearGradient id="bg_4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#DFA0B8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D08AA8;stop-opacity:1" />
    </linearGradient>
    <clipPath id="clip_4">
      <rect width="440" height="220" rx="22" ry="22"/>
    </clipPath>
  </defs>
  <rect width="440" height="220" rx="22" ry="22" fill="url(#bg_4)"/>
  <g clip-path="url(#clip_4)">
    <!-- letter circle, partially clipped at top-left -->
    <circle cx="55" cy="55" r="38" fill="white" opacity="0.35"/>
    <text x="55" y="66" font-family="Georgia, 'Times New Roman', serif" font-size="32" font-weight="bold" fill="#4A3548" text-anchor="middle">A</text>
    <!-- title -->
    <text x="110" y="56" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif" font-size="28" font-weight="800" fill="#3D2B3A">Album Cover</text>
    <!-- description -->
    <text x="110" y="88" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif" font-size="17" fill="#5A4558">专辑封面制作器</text>
    <!-- language badge -->
    <rect x="30" y="140" width="110" height="34" rx="17" fill="white" opacity="0.5"/>
    <circle cx="52" cy="157" r="7" fill="#e34c26"/>
    <text x="67" y="163" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif" font-size="16" font-weight="500" fill="#3D2B3A">HTML</text>
    <!-- three-dot bump -->
    <ellipse cx="52" cy="220" rx="40" ry="18" fill="white" opacity="0.35"/>
    <circle cx="36" cy="210" r="4.5" fill="white" opacity="0.7"/>
    <circle cx="52" cy="210" r="4.5" fill="white" opacity="0.7"/>
    <circle cx="68" cy="210" r="4.5" fill="white" opacity="0.7"/>
  </g>
</svg>